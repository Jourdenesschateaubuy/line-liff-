<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JOURDENESS CASTLE | 城堡珍稀高訂肌膚黃金配方</title>

<script>
var LINE_ID = "@jourdeness_castle";

/* =========================
   DATABASE
========================= */
var database = {
    platinum: {
        title: "💎 鉑金無痕煥白雙導精華",
        target: "細紋＋暗沉",
        why: "雙導科技同步抗皺與亮白，形成肌底防禦網。",
        comp: "白金超導微分子",
        prod: "鉑金無痕煥白雙導精華",
        img: "https://images.unsplash.com/photo-1556228578-8c89e6adf883?w=400"
    },
    travel: {
        title: "🥀 玫瑰超微晶萃系列",
        target: "暗沉發灰",
        why: "NanoTOBI 微米導入技術提升吸收效率。",
        comp: "玫瑰精粹微囊",
        prod: "玫瑰超微晶萃瞬效霜",
        img: "https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?w=400"
    },
    ecosystem: {
        title: "🧪 INSK 乳酸平衡系列",
        target: "敏感泛紅",
        why: "益菌修護肌膚微生態。",
        comp: "益菌平衡因子",
        prod: "INSK 乳酸平衡水嫩膜",
        img: "https://images.unsplash.com/photo-1620916566398-39f1143ab7be?w=400"
    }
};

/* =========================
   SAFE RENDER FUNCTION
========================= */
function setText(id, value) {
    var el = document.getElementById(id);
    if (el) el.innerText = value || "";
}

function setHTML(id, value) {
    var el = document.getElementById(id);
    if (el) el.innerHTML = value || "";
}

function setImg(id, value) {
    var el = document.getElementById(id);
    if (el) el.src = value || "https://via.placeholder.com/300";
}

/* =========================
   MAIN FUNCTION (NO CRASH)
========================= */
function revealPrescription(el, type) {

    var selected = database[type];
    if (!selected) return;

    // active UI
    var cards = document.querySelectorAll('.demand-card');
    for (var i = 0; i < cards.length; i++) {
        cards[i].classList.remove('active');
    }
    if (el) el.classList.add('active');

    // DOM safe update
    setText('res-title', selected.title);
    setText('res-target', selected.target);
    setHTML('skin-why', selected.why);
    setText('component-name', selected.comp);
    setText('prod-name', selected.prod);
    setImg('prod-img-tag', selected.img);

    var panel = document.getElementById('prescription-panel');
    if (panel) {
        panel.style.display = 'block';
        setTimeout(function () {
            panel.scrollIntoView({ behavior: "smooth", block: "start" });
        }, 100);
    }
}
</script>

<style>
body{
    margin:0;
    background:#121212;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:#fff;
}
.wrapper{
    max-width:460px;
    margin:auto;
    padding:24px;
}
.card{
    background:#222;
    border:1px solid #333;
    padding:16px;
    margin-bottom:12px;
    cursor:pointer;
}
.card.active{
    border-color:#d4af37;
    background:#2a241e;
}
.panel{
    display:none;
    margin-top:24px;
    padding-top:24px;
    border-top:1px solid #333;
}
.title{
    color:#d4af37;
    font-size:18px;
    text-align:center;
}
.box{
    background:#1a1a1a;
    padding:14px;
    margin-top:12px;
    border-left:3px solid #d4af37;
    font-size:13px;
}
.imgbox{
    width:160px;
    height:160px;
    margin:16px auto;
    background:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
}
.imgbox img{
    max-width:100%;
    max-height:100%;
}
</style>
</head>

<body>

<div class="wrapper">

    <div class="card" onclick="revealPrescription(this,'platinum')">
        💎 鉑金無痕煥白雙導精華
        <span>細紋 + 暗沉</span>
    </div>

    <div class="card" onclick="revealPrescription(this,'travel')">
        🥀 玫瑰超微晶萃系列
        <span>暗沉發灰</span>
    </div>

    <div class="card" onclick="revealPrescription(this,'ecosystem')">
        🧪 INSK 乳酸平衡系列
        <span>敏感泛紅</span>
    </div>

    <div id="prescription-panel" class="panel">

        <div id="res-title" class="title"></div>

        <div class="box">
            <div id="res-target"></div>
        </div>

        <div class="box" id="skin-why"></div>

        <div class="box">
            成分：<span id="component-name"></span>
        </div>

        <div class="imgbox">
            <img id="prod-img-tag" src="">
        </div>

        <div class="box">
            <b id="prod-name"></b>
        </div>

    </div>

</div>

</body>
</html>
