<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOURDENESS CASTLE</title>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: sans-serif; padding: 20px; text-align: center; }
        .wrapper { max-width: 400px; margin: 0 auto; background: #1a1a1a; border: 1px solid #332a21; padding: 20px; }
        h2 { color: #d4af37; font-size: 20px; margin-bottom: 20px; }
        .btn { width: 100%; background: #222222; border: 1px solid #333333; color: #ffffff; padding: 15px; margin-bottom: 10px; cursor: pointer; text-align: left; display: block; font-size: 14px; }
        .btn:active { background: #2a241e; border-color: #d4af37; }
        #panel { display: none; margin-top: 20px; padding: 15px; background: #1e1914; border-left: 2px solid #d4af37; text-align: left; }
        .comp { color: #d4af37; font-weight: bold; margin-top: 10px; }
    </style>
    <script>
    var database = {
        rose: {
            why: "熟齡肌最常面臨『中午過後膚色暗沉發灰』的尷尬。真相是：老化的皮膚表面就像一塊曬乾、變硬的絲瓜絡，吸收通道早已卡死。分子巨大的普通玫瑰油只會堆在表面氧化變黃！佐登專利 NanoTOBI 技術，將頂級玫瑰精粹縮小成無數個『微米超導膠囊』，像穿牆彈一樣穿透僵硬角質，2.3倍直攻肌底，重新通開吸收開關。這不是多擦一瓶保養品，是幫妳化妝桌上的乳霜裝上極致放大器。",
            comp: "四國富硒玫瑰精粹 × NanoTOBI 專利技術",
            prod: "玫瑰超微晶萃系列"
        },
        shield: {
            why: "不論是換季大脫屑，還是剛做完皮秒、電音波醫美，微創期的肌膚乾到像要裂開。這時候盲目狂灌玻尿酸（補水），皮膚就像一個底部破了無數大洞的漏水水桶。水分倒進去立馬蒸發，還會物理性地把肌底僅存的微量水分一起帶走，導致『越保濕越乾癟』，甚至誤擦含有化學酸類/香精的普通保養品而發炎反黑！這款處方中，玻尿酸負責加水，而秘魯龍血則是扮演水桶的防水補丁。它在科學本質上是『液態無菌防護罩』，一抹下去就像把脆弱的植物放進無菌溫室，安撫發燙泛紅，把水分死死鎖在基底，為妳昂貴的醫美效果與奢華保養買一份終極保險。",
            comp: "頂級秘魯龍血超導活性 × 瞬效爆水玻尿酸",
            prod: "龍血求麗修護系列"
        }
    };

    function checkSkin(type) {
        var panel = document.getElementById('panel');
        var text = document.getElementById('info');
        var comp = document.getElementById('comp');
        if (!panel || !text || !comp) return;
        
        text.innerHTML = database[type].why;
        comp.innerText = "🌟 城堡高訂核心成分：" + database[type].comp;
        panel.style.display = 'block';
    }
    </script>
</head>
<body>

    <div class="wrapper">
        <h2>Jourdeness Castle<br><span style="font-size:12px; color:#999;">城堡高訂系列與肌膚危情自檢</span></h2>
        <p style="font-size:13px; color:#ccc; margin-bottom:20px;">點擊下方經典系列，鑑賞妳的肌膚黃金配方</p>
        
        <button class="btn" onclick="checkSkin('rose')">🥀 玫瑰超微晶萃系列<br><span style="font-size:11px; color:#888;">解決問題：中午膚色發灰暗沉、底妝卡粉</span></button>
        <button class="btn" onclick="checkSkin('shield')">🛡️ 龍血求麗修護系列<br><span style="font-size:11px; color:#888;">解決問題：醫美術後乾燥、換季極端脫屑</span></button>

        <div id="panel">
            <p id="info" style="font-size:13.5px; color:#eee; margin:0;"></p>
            <div id="comp" class="comp"></div>
        </div>
    </div>

</body>
</html>
