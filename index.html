            prod: "城堡黑標．INSK 乳酸平衡系列 (老客必備雪露)"

            why: "<b>👑 為什麼妳在此刻需要這款處方？</b><br>拍合照頭稍微低一點下顎線就消失？一微笑底妝就精準卡在深深的法令紋裡？這代表肌底正在『慢性塌陷』。如果把皮膚比喻成一棟房子，水分和乳霜只是表面的油漆，而彈力纖維則是水泥內部的鋼筋。<b>當底層的鋼筋（彈力網）因為年齡而斷裂、大塌陷時，妳在房頂刷再厚、再貴的精美油漆（乳霜），輪廓線依然會照樣塌給妳看！</b><br><br>肌光緊緻系列利用高訂微分子胜肽，能直接穿透皮表，化身為無數條<b>隱形生物鋼絲</b>，網狀牽引、死死拉住下垂的輪廓線，並同時進行底層水泥灌漿，把法令紋與凹陷從最深處垂直往上撐起。",

    function revealPrescription(element, type) {
        var cards = document.querySelectorAll('.demand-card');
        for (var i = 0; i < cards.length; i++) {
            cards[i].classList.remove('active');
        }
        element.classList.add('active');

        var panel = document.getElementById('prescription-panel');
        var selected = database[type];

        document.getElementById('skin-why').innerHTML = selected.why;
        document.getElementById('component-name').innerText = selected.comp;
        document.getElementById('prod-name').innerText = selected.prod;

        panel.style.display = 'block';

        // 電腦網頁端預覽除錯警示，確保邏輯完美
        var isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        if (!isMobile) {
            console.log("✨【佐登城堡美學沙龍】老客成功點擊分析器：" + selected.prod);
        }

        setTimeout(function() {
            panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 100);
    }
