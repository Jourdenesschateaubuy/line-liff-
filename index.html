<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>佐登妮絲 🔬 智能精準膚況檢測系統</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #fcf9f6;
            margin: 0;
            padding: 20px 16px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #2b2b2b;
            line-height: 1.5;
        }
        .app-card {
            max-width: 480px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 24px;
            padding: 28px 20px;
            box-shadow: 0 12px 32px rgba(163, 145, 130, 0.12);
        }
        .brand-header {
            text-align: center;
            margin-bottom: 28px;
        }
        .brand-name {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #b18764;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .main-title {
            font-size: 22px;
            color: #4a3c31;
            margin: 0;
            font-weight: 700;
        }
        .section-label {
            font-size: 14px;
            font-weight: 600;
            color: #615043;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        /* 膚質選擇鈕美化 */
        .grid-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 24px;
        }
        .option-btn {
            background: #fdfcfb;
            border: 1px solid #eaddd3;
            border-radius: 14px;
            padding: 16px 8px;
            font-size: 14px;
            font-weight: 600;
            color: #5c524a;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
        }
        .option-btn:active, .option-btn.active {
            background: #8a6d53;
            border-color: #8a6d53;
            color: #ffffff;
            box-shadow: 0 6px 14px rgba(138, 109, 83, 0.25);
            transform: translateY(-2px);
        }
        /* 結果分析區塊 */
        #result-panel {
            display: none;
            border-top: 1px solid #f2ece6;
            margin-top: 24px;
            padding-top: 24px;
            animation: slideUp 0.45s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .analysis-badge {
            background: #f7ece4;
            color: #8a6d53;
            font-size: 12px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 12px;
        }
        .diagnosis-text {
            font-size: 14px;
            color: #555555;
            margin-bottom: 20px;
            background: #faf7f4;
            padding: 14px;
            border-radius: 12px;
            border-left: 3px solid #b18764;
        }
        /* 成分圖表卡片 */
        .ingredient-card {
            background: #ffffff;
            border: 1px solid #eee7e1;
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 24px;
        }
        .ing-row {
            margin-bottom: 14px;
        }
        .ing-row:last-child { margin-bottom: 0; }
        .ing-meta {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .ing-name { color: #4a3c31; }
        .ing-percent { color: #b18764; }
        .progress-bg {
            background: #eedfd3;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-bar {
            background: linear-gradient(90deg, #b18764, #8a6d53);
            height: 100%;
            width: 0%;
            transition: width 0.8s ease-out;
        }
        /* 推薦商品結構 */
        .product-box {
            display: flex;
            align-items: center;
            gap: 16px;
            background: #fdfbf9;
            padding: 14px;
            border-radius: 16px;
            border: 1px solid #f2ece6;
        }
        .prod-image {
            width: 76px;
            height: 76px;
            background: #ffffff;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }
        .prod-detail { flex: 1; }
        .prod-title { font-weight: 700; font-size: 15px; color: #333; margin-bottom: 4px; }
        .prod-price { color: #d9411e; font-weight: 700; font-size: 16px; }
        .prod-price del { font-size: 11px; color: #aaa; margin-left: 6px; font-weight: 400; }
        .cta-button {
            display: block;
            width: 100%;
            background: #8a6d53;
            color: #ffffff;
            text-align: center;
            text-decoration: none;
            padding: 15px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            margin-top: 16px;
            box-shadow: 0 6px 16px rgba(138, 109, 83, 0.2);
        }
        .cta-button:active { background: #6e553f; }
    </style>
</head>
<body>

    <div class="app-card">
        <div class="brand-header">
            <div class="brand-name">JOURDENESS LAB</div>
            <h2 class="main-title">AI 精準配方檢測</h2>
        </div>

        <!-- 步驟 1：選擇膚質 -->
        <div class="section-label">📌 步驟 1：請選擇您的核心膚質</div>
        <div class="grid-options">
            <button onclick="analyzeSkin(this, 'oily')" class="option-btn">🧪 油性肌</button>
            <button onclick="analyzeSkin(this, 'dry')" class="option-btn">🍂 乾性肌</button>
            <button onclick="analyzeSkin(this, 'mix')" class="option-btn">⚖️ 混合肌</button>
        </div>

        <!-- 步驟 2：動態分析面板 -->
        <div id="result-panel">
            <div class="section-label">🔬 步驟 2：專屬配方與活性成分分析</div>
            <div class="analysis-badge" id="skin-tag"></div>
            <div class="diagnosis-text" id="skin-diag"></div>

            <!-- 成分配比分析圖 -->
            <div class="ingredient-card">
                <div style="font-size: 12px; font-weight: 700; color: #8a6d53; margin-bottom: 12px;">📊 核心活性成分配比（黃金比例）</div>
                
                <div class="ing-row">
                    <div class="ing-meta"><span class="ing-name" id="ing1-name"></span><span class="ing-percent" id="ing1-val"></span></div>
                    <div class="progress-bg"><div class="progress-bar" id="bar1"></div></div>
                </div>
                <div class="ing-row">
                    <div class="ing-meta"><span class="ing-name" id="ing2-name"></span><span class="ing-percent" id="ing2-val"></span></div>
                    <div class="progress-bg"><div class="progress-bar" id="bar2"></div></div>
                </div>
            </div>

            <!-- 建議體驗商品 -->
            <div class="section-label">✨ 步驟 3：為您定制的修護對策</div>
            <div class="product-box">
                <div class="prod-image" id="prod-img">🧴</div>
                <div class="prod-detail">
                    <div class="prod-title" id="prod-name"></div>
                    <div class="prod-price" id="prod-price"></div>
                </div>
            </div>
            
            <a href="https://jourdeness.com" id="prod-link" target="_blank" class="cta-button">領取專屬尊榮體驗組</a>
        </div>
    </div>

    <script>
    function analyzeSkin(element, type) {
        // 切換按鈕樣式
        document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');

        // 抓取 DOM 元素
        const panel = document.getElementById('result-panel');
        const tag = document.getElementById('skin-tag');
        const diag = document.getElementById('skin-diag');
        const ing1N = document.getElementById('ing1-name'); const ing1V = document.getElementById('ing1-val'); const bar1 = document.getElementById('bar1');
        const ing2N = document.getElementById('ing2-name'); const ing2V = document.getElementById('ing2-val'); const bar2 = document.getElementById('bar2');
        const pName = document.getElementById('prod-name');
        const pPrice = document.getElementById('prod-price');
        const pImg = document.getElementById('prod-img');
        const pLink = document.getElementById('prod-link');

        panel.style.display = 'block';

        // 資料庫：不同膚質對應不同分析與產品
        const data = {
            oily: {
                tag: "油性肌膚診斷：油脂分泌過剩、毛孔粗大",
                diag: "您的肌膚屏障目前處於皮脂腺高度活躍狀態。若盲目控油會導致內乾外油。科學配方建議引入【水楊酸】溶解深層毛孔頑垢，並搭配【茶樹萃取】進行底層調理。",
                ing1: "水楊酸 (BHA)", ing1Val: "2.0%", bar1W: "90%",
                ing2: "茶樹精純物", ing2Val: "1.5%", bar2W: "75%",
                prod: "苦杏仁酸溫和煥膚精華", price: "$880 <del>$1,200</del>", img: "🧪",
                link: "https://jourdeness.com"
            },
            dry: {
                tag: "乾性肌膚診斷：角質層缺水、易敏感泛紅",
                diag: "您的肌膚皮脂分泌量較低，鎖水屏障極度脆弱，易因換季產生隱形微裂口。黃金配方必須使用高濃度【秘魯龍血萃取】修復受損細胞，搭配【小分子玻尿酸】高密度灌注水分。",
                ing1: "秘魯龍血超導萃取", ing1Val: "5.0%", bar1W: "95%",
                ing2: "高純度玻尿酸", ing2Val: "3.5%", bar2W: "85%",
                prod: "龍血求麗精華 30ml", price: "$1,190 <del>$1,580</del>", img: "🩸",
                link: "https://jourdeness.com/product-detail/CHL009"
            },
            mix: {
                tag: "混合性肌膚診斷：T字油、兩頰乾、水油失衡",
