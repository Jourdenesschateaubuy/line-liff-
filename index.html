<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>佐登妮絲 AI 精準膚況檢測</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
    background:#fcf9f6;
    padding:20px;
}

.app-card{
    max-width:480px;
    margin:auto;
    background:#fff;
    border-radius:24px;
    padding:24px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.brand-header{
    text-align:center;
    margin-bottom:25px;
}

.brand-name{
    color:#b18764;
    font-size:12px;
    letter-spacing:3px;
    margin-bottom:8px;
}

.main-title{
    color:#4a3c31;
    font-size:24px;
}

.section-label{
    font-size:15px;
    font-weight:700;
    margin-bottom:12px;
    color:#5a4c42;
}

.option-btn{
    width:100%;
    border:none;
    background:#faf7f4;
    border:1px solid #eadfd5;
    border-radius:14px;
    padding:16px;
    margin-bottom:10px;
    cursor:pointer;
    font-size:15px;
    font-weight:600;
    transition:.2s;
}

.option-btn:hover{
    background:#f2ebe5;
}

.option-btn.active{
    background:#8a6d53;
    color:#fff;
    border-color:#8a6d53;
}

#result-panel{
    display:none;
    margin-top:25px;
    border-top:1px solid #eee;
    padding-top:25px;
}

.analysis-badge{
    display:inline-block;
    background:#f7ece4;
    color:#8a6d53;
    padding:6px 10px;
    border-radius:8px;
    font-size:13px;
    font-weight:bold;
    margin-bottom:12px;
}

.diagnosis-text{
    background:#faf7f4;
    padding:14px;
    border-radius:12px;
    font-size:14px;
    line-height:1.7;
    margin-bottom:20px;
}

.ingredient-card{
    border:1px solid #eee7e1;
    border-radius:16px;
    padding:16px;
    margin-bottom:20px;
}

.ing-row{
    margin-bottom:15px;
}

.ing-meta{
    display:flex;
    justify-content:space-between;
    margin-bottom:6px;
    font-size:13px;
}

.progress-bg{
    background:#eee0d5;
    height:8px;
    border-radius:99px;
    overflow:hidden;
}

.progress-bar{
    height:100%;
    width:0;
    background:#8a6d53;
    transition:.8s;
}

.product-box{
    display:flex;
    gap:15px;
    align-items:center;
    background:#faf7f4;
    border-radius:16px;
    padding:15px;
}

.prod-image{
    width:70px;
    height:70px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:34px;
    background:white;
    border-radius:12px;
}

.prod-detail{
    flex:1;
}

.prod-title{
    font-weight:700;
    margin-bottom:6px;
}

.prod-price{
    color:#d84a23;
    font-weight:700;
}

.cta-button{
    display:block;
    text-align:center;
    background:#8a6d53;
    color:#fff;
    text-decoration:none;
    padding:15px;
    border-radius:14px;
    margin-top:16px;
    font-weight:700;
}
</style>

</head>

<body>

<div class="app-card">

```
<div class="brand-header">
    <div class="brand-name">JOURDENESS LAB</div>
    <h2 class="main-title">AI 精準膚況檢測</h2>
</div>

<div class="section-label">
    📌 請選擇您的核心膚質
</div>

<button class="option-btn" onclick="analyzeSkin(this,'oily')">
    🧪 油性肌
</button>

<button class="option-btn" onclick="analyzeSkin(this,'dry')">
    🍂 乾性肌
</button>

<button class="option-btn" onclick="analyzeSkin(this,'mix')">
    ⚖️ 混合肌
</button>

<div id="result-panel">

    <div class="section-label">
        🔬 AI分析結果
    </div>

    <div id="skin-tag" class="analysis-badge"></div>

    <div id="skin-diag" class="diagnosis-text"></div>

    <div class="ingredient-card">

        <div style="font-weight:bold;margin-bottom:15px;color:#8a6d53;">
            📊 肌膚需求分析
        </div>

        <div class="ing-row">
            <div class="ing-meta">
                <span id="ing1-name"></span>
                <span id="ing1-val"></span>
            </div>
            <div class="progress-bg">
                <div id="bar1" class="progress-bar"></div>
            </div>
        </div>

        <div class="ing-row">
            <div class="ing-meta">
                <span id="ing2-name"></span>
                <span id="ing2-val"></span>
            </div>
            <div class="progress-bg">
                <div id="bar2" class="progress-bar"></div>
            </div>
        </div>

    </div>

    <div class="section-label">
        ✨ 居家保養推薦
    </div>

    <div class="product-box">

        <div id="prod-img" class="prod-image">🧴</div>

        <div class="prod-detail">
            <div id="prod-name" class="prod-title"></div>
            <div id="prod-price" class="prod-price"></div>
        </div>

    </div>

    <a id="prod-link"
       class="cta-button"
       href="https://jourdeness.com"
       target="_blank">
       🎁 領取專屬體驗組
    </a>

</div>
```

</div>

<script>

function analyzeSkin(element,type){

    document.querySelectorAll('.option-btn').forEach(function(btn){
        btn.classList.remove('active');
    });

    element.classList.add('active');

    const data = {

        oily:{
            tag:"油性肌膚分析",
            diag:"您的肌膚皮脂分泌較旺盛，容易出現毛孔粗大與油光問題，建議以溫和代謝角質與平衡油脂為保養重點。",
            ing1:"控油需求",
            ing1Val:"90%",
            bar1:"90%",
            ing2:"毛孔淨化需求",
            ing2Val:"75%",
            bar2:"75%",
            prod:"苦杏仁酸溫和煥膚精華",
            price:"$880",
            img:"🧪",
            link:"https://jourdeness.com"
        },

        dry:{
            tag:"乾性肌膚分析",
            diag:"您的肌膚保水能力較弱，容易出現乾燥、脫屑與泛紅情況，建議優先修護肌膚屏障並提升保濕能力。",
            ing1:"修護需求",
            ing1Val:"95%",
            bar1:"95%",
            ing2:"補水需求",
            ing2Val:"85%",
            bar2:"85%",
            prod:"龍血求麗精華 30ml",
            price:"$1,190",
            img:"🩸",
            link:"https://jourdeness.com"
        },

        mix:{
            tag:"混合肌膚分析",
            diag:"您的肌膚呈現水油不平衡狀態，T字部位容易出油，兩頰偏乾，建議以平衡調理與穩定肌膚屏障為主。",
            ing1:"油水平衡需求",
            ing1Val:"80%",
            bar1:"80%",
            ing2:"修護需求",
            ing2Val:"70%",
            bar2:"70%",
            prod:"玫瑰修護精華",
            price:"$680",
            img:"🌹",
            link:"https://jourdeness.com"
        }
    };

    const res = data[type];

    document.getElementById("result-panel").style.display = "block";

    document.getElementById("skin-tag").innerText = res.tag;
    document.getElementById("skin-diag").innerText = res.diag;

    document.getElementById("ing1-name").innerText = res.ing1;
    document.getElementById("ing1-val").innerText = res.ing1Val;

    document.getElementById("ing2-name").innerText = res.ing2;
    document.getElementById("ing2-val").innerText = res.ing2Val;

    document.getElementById("prod-name").innerText = res.prod;
    document.getElementById("prod-price").innerText = res.price;
    document.getElementById("prod-img").innerText = res.img;
    document.getElementById("prod-link").href = res.link;

    document.getElementById("bar1").style.width = "0%";
    document.getElementById("bar2").style.width = "0%";

    setTimeout(function(){

        document.getElementById("bar1").style.width = res.bar1;
        document.getElementById("bar2").style.width = res.bar2;

    },100);

}

</script>

</body>
</html>
