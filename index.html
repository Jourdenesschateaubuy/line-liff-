<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JOURDENESS CASTLE | 城堡珍稀高訂肌膚處方</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #121212;
            margin: 0;
            padding: 24px 16px;
            font-family: "Times New Roman", Times, "Noto Serif TC", serif, -apple-system, sans-serif;
            color: #ffffff;
            line-height: 1.6;
        }
        .luxury-wrapper {
            max-width: 440px;
            margin: 0 auto;
            background: #1a1a1a;
            border: 1px solid #332a21;
            padding: 40px 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }
        .brand-header {
            text-align: center;
            margin-bottom: 36px;
        }
        .brand-logo {
            font-size: 22px;
            font-weight: 300;
            letter-spacing: 5px;
            color: #d4af37;
            margin: 0 0 6px 0;
            text-transform: uppercase;
        }
        .brand-divider {
            width: 30px;
            height: 1px;
            background: #d4af37;
            margin: 14px auto;
        }
        .main-subtitle {
            font-size: 13px;
            letter-spacing: 2px;
            color: #999999;
            margin: 0;
            font-weight: 300;
        }
        .section-title {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #d4af37;
            margin-bottom: 18px;
            font-weight: 400;
            text-align: center;
        }
        .demand-container {
            margin-bottom: 32px;
        }
        .demand-card {
            width: 100%;
            background: #222222;
            border: 1px solid #333333;
            padding: 20px 16px;
            font-size: 14px;
            letter-spacing: 1px;
            color: #cccccc;
            cursor: pointer;
            text-align: left;
            margin-bottom: 14px;
            position: relative;
            transition: all 0.3s ease;
            line-height: 1.5;
            display: block;
        }
        .demand-card:active, .demand-card.active {
            background: #2a241e;
            border-color: #d4af37;
            color: #ffffff;
        }
        .demand-card::after {
            content: '→';
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #444444;
        }
        .demand-card.active::after {
            color: #d4af37;
        }
        .demand-card span {
            display: block;
            font-size: 11px;
            color: #888888;
            margin-top: 4px;
            letter-spacing: 0.5px;
        }
        #prescription-panel {
            display: none;
            border-top: 1px solid #332a21;
            margin-top: 36px;
            padding-top: 32px;
        }
        .why-box {
            background: #1e1914;
            border-left: 2px solid #d4af37;
            padding: 16px;
            font-size: 13.5px;
            color: #cccccc;
            margin-bottom: 24px;
            letter-spacing: 1px;
            line-height: 1.8;
            text-align: justify;
        }
        .why-box b {
            color: #d4af37;
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
        }
        .component-meta {
            font-size: 11px;
            letter-spacing: 2px;
            color: #888888;
            margin-bottom: 6px;
            text-transform: uppercase;
        }
        .component-value {
            font-size: 16px;
            color: #ffffff;
            margin-bottom: 24px;
            letter-spacing: 1px;
        }
        .showcase-box {
            background: #1a1a1a;
            border: 1px solid #2b2b2b;
            padding: 24px 16px;
            text-align: center;
            margin-top: 16px;
        }
        .prod-label {
            font-size: 10px;
            letter-spacing: 2px;
            color: #d4af37;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .prod-title {
            font-size: 16px;
            font-weight: 500;
            color: #ffffff;
            margin: 0 0 8px 0;
            letter-spacing: 1px;
        }
        .prod-price {
            font-size: 15px;
            color: #e0deda;
            letter-spacing: 1px;
        }
        .prod-note {
            font-size: 11px;
            color: #777777;
            margin-top: 10px;
            letter-spacing: 0.5px;
        }
        .luxury-cta {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, #e5c060, #b18764);
            color: #121212;
            text-align: center;
            text-decoration: none;
            padding: 16px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 28px;
            box-shadow: 0 8px 24px rgba(177, 135, 100, 0.25);
            cursor: pointer;
            border: none;
        }
    </style>
</head>
<body>

    <div class="luxury-wrapper">
        <div class="brand-header">
            <div class="brand-logo">Jourdeness Castle</div>
            <div class="main-subtitle">佐登妮絲城堡 | 奢華高訂肌膚處方</div>
            <div class="brand-divider"></div>
        </div>

        <div class="section-title">請選擇您目前迫切需要被解決的肌膚核心渴望</div>
        <div class="demand-container">
            <button onclick="revealPrescription(this, 'aesthetic')" class="demand-card">
                ✨ 醫美雷射術後急需高密度保濕
                <span>特殊狀態：脆弱泛紅、絕不能碰酸、極需細胞自我修護</span>
            </button>
            <button onclick="revealPrescription(this, 'spots')" class="demand-card">
                ⏳ 長年頑固老人斑、深層點狀曬斑
                <span>歲月痕跡：一般的亮白無效、渴望精專標靶定點擊碎</span>
            </button>
            <button onclick="revealPrescription(this, 'sagging')" class="demand-card">
                👑 熟齡面部輪廓鬆弛、深層垮臉乾紋
                <span>頂級抗衰：拍照不再有底氣、底妝精準卡在法令紋</span>
            </button>
        </div>

        <div id="prescription-panel">
            <div class="section-title">城堡高級訂製對策</div>
            
            <div class="why-box" id="skin-why"></div>

            <div class="component-meta">珍稀奢華核心成分</div>
            <div class="component-value" id="component-name"></div>

            <div class="showcase-box">
                <div class="prod-label">佐登城堡限定珍萃系列</div>
                <h4 class="prod-title" id="prod-name"></h4>
                <div class="prod-price" id="prod-price"></div>
                <div class="prod-note">※ 本珍稀系列採限量配額，由城堡私人專櫃師一對一諮詢提供。</div>
            </div>
            
            <button onclick="redirectToLine()" class="luxury-cta">與城堡私人專櫃師一對一諮詢下單</button>
        </div>
    </div>

    <script>
    // 💡 城堡官方帳號 LINE ID
    var LINE_ID = "@jourdeness_castle"; 

    var currentMsg = ""; // 儲存當前點選的下單文字
    var globalLineUrl = "";

    var database = {
        aesthetic: {
            why: "<b>為什麼您在此刻需要這款處方？</b><br>醫美雷射後的肌膚屏障處於極微創狀態，普通的玻尿酸保濕只能停留在表皮，無法修復底層。此時的肌膚極其脆弱，絕對不能接觸任何一絲酸類。這款處方能像為肌膚蓋上一座『無菌修護溫室』，提供極高濃度的龍血自我修復能耐，在底層阻斷水分蒸發、全面防止反黑危機。",
            comp: "頂級秘魯龍血超導活性精純物 × 零負擔舒緩屏障因子",
            prod: "城堡至臻龍血超導術後修護尊榮組",
            price: "專櫃訂製價 NT$ 3,680 起",
            msg: "我想預約諮詢【城堡至臻龍血超導術後修護尊榮組】。我剛做完醫美雷射，急需不能用酸的高密度術後修護，請安排城堡專櫃師協助我下一對一訂單。"
        },
        spots: {
            why: "<b>為什麼您在此刻需要這款處方？</b><br>隨著歲月沉澱的老人斑與頑固斑點，是由於基底層黑色素母細胞長期堆積而成，開架的化學去角質只能淡化表皮，甚至會讓肌膚變薄變敏感。您需要的是如藝術品般精雕細琢的『標靶定點淡化技術』，高純度的精粹能精準滲透，像橡皮擦一樣定點瓦解深層色素，長期使用讓肌膚重回豪門貴婦般的通透淨白。",
            comp: "城堡專利高訂傳明酸 × 標靶淨斑科技因子",
            prod: "城堡皇家傳明酸定點奢華淡斑筆系列",
            price: "專櫃訂製價 NT$ 4,500 起",
            msg: "我想預約諮詢【城堡皇家傳明酸定點奢華淡斑筆系列】。我目前有長年頑固老人斑、曬斑的困擾，想透過淡斑筆系列進行定點淨白，請幫我安排專櫃師下單。"
        },
        sagging: {
            why: "<b>為什麼您在此刻需要這款處方？</b><br>女性最優雅的底氣，來自緊緻的面部輪廓線。當膠原蛋白因不可逆的引力流失，鬆弛與深層法令紋就會讓底妝無處躲藏。這款處方不添加任何刺激物，而是以極其奢華的大馬士革玫瑰微分子與智慧胜肽，像微型鋼絲一樣網狀填補肌膚紋理，透過長期居家護理，幫肌膚找回頂級大牌推崇的豐盈輪廓線。",
            comp: "皇家大馬士革玫瑰微分子精粹 × 智慧逆齡複合胜肽",
            prod: "城堡御用大馬士革玫瑰極致逆齡奢華全效組",
            price: "專櫃訂製價 NT$ 3,980 起",
            msg: "我想預約諮詢【城堡御用大馬士革玫瑰極致逆齡奢華全效組】。我目前有熟齡垮臉、輪廓鬆弛與法令紋的困擾，想透過大馬士革玫瑰逆齡組改善，請安排專櫃師協助下一對一訂單。"
        }
    };

    function revealPrescription(element, type) {
        var cards = document.querySelectorAll('.demand-card');
        for (var i = 0; i < cards.length; i++) {
            cards[i].classList.remove('active');
        }
        element.classList.add('active');

        var panel = document.getElementById('prescription-panel');
        var selected = database[type];

        document.getElementById('skin-why').innerHTML = selected.why;
        document.getElementById('component-name').innerText = selected.comp;
        document.getElementById('prod-name').innerText = selected.prod;
        document.getElementById('prod-price').innerHTML = selected.price;

        // 紀錄目前的發送訊息
        currentMsg = selected.msg;
        globalLineUrl = "https://line.me" + LINE_ID + "/?" + encodeURIComponent(currentMsg);

        panel.style.display = 'block';

        setTimeout(function() {
            panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 100);
    }

    function redirectToLine() {
        // 偵測是否在智慧型手機/行動裝置環境
        var isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        
        if (isMobile) {
            // 手機端正常跳轉到 LINE
            window.location.href = globalLineUrl;
            setTimeout(function() {
                window.location.href = "https://line.me" + LINE_ID;
            }, 500);
        } else {
            // 💻 電腦網頁測試端：彈出奢華通知，展示預期文字
